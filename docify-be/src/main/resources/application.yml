server:
  port: 8080

spring:
  application:
    name: docify-be

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  profiles:
    active: dev

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:local-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:local-google-client-secret}
            redirect-uri: "{baseUrl}/oauth2/callback/{registrationId}"
            scope:
              - email
              - profile
            
          github:
            client-id: ${GITHUB_CLIENT_ID:local-github-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:local-github-client-secret}
            redirect-uri: "{baseUrl}/oauth2/callback/{registrationId}"
            scope:
              - user:email
              - read:user

        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://www.googleapis.com/oauth2/v4/token
            user-info-uri: https://www.googleapis.com/oauth2/v1/userinfo
            user-name-attribute: id
            
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: id

  datasource:
    url: jdbc:postgresql://localhost:5432/docify_db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 2000ms
          max-attempts: 3
          multiplier: 2

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 60MB
      file-size-threshold: 2MB

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method

docify:
  storage:
    type: local
    local-dir: ./storage
    local:
      temp-dir: ./storage/tmp
      result-dir: ./storage/results
    ttl-minutes: 60

  conversion:
    max-file-size-mb: 50
    allowed-source-types:
      - pdf
      - docx
      - pptx
      - md
      - markdown
    allowed-target-types:
      - pdf
      - docx
      - md
      - markdown
    job-timeout-seconds: 300

  queue:
    exchange: docify.exchange
    conversion-queue: docify.conversion.queue
    conversion-routing-key: docify.conversion
    dead-letter-exchange: docify.dlx
    dead-letter-queue: docify.conversion.dlq
    dead-letter-routing-key: docify.conversion.failed

  gotenberg:
    base-url: http://localhost:3000
    timeout-seconds: 120

  pandoc:
    enabled: true
    binary-path: pandoc
    timeout-seconds: 120

  cleanup:
    enabled: true
    cron: "0 */10 * * * *"

  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/redirect}

logging:
  level:
    root: INFO
    com.docify: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.amqp: INFO

server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: docify-be

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/docify_db
    username: postgres
    password: 12345
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        retry:
          enabled: true
          initial-interval: 2000ms
          max-attempts: 3
          multiplier: 2

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 60MB
      file-size-threshold: 2MB

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method

docify:
  storage:
    type: local
    local-dir: ./storage
    temp-dir: ./storage/tmp
    result-dir: ./storage/results
    ttl-minutes: 60

  conversion:
    max-file-size-mb: 50
    allowed-source-types:
      - pdf
      - docx
      - pptx
      - md
      - markdown
    allowed-target-types:
      - pdf
      - docx
      - md
      - markdown
    job-timeout-seconds: 300

  queue:
    exchange: docify.exchange
    conversion-queue: docify.conversion.queue
    conversion-routing-key: docify.conversion
    dead-letter-exchange: docify.dlx
    dead-letter-queue: docify.conversion.dlq
    dead-letter-routing-key: docify.conversion.failed

  gotenberg:
    base-url: http://localhost:3000
    timeout-seconds: 120

  pandoc:
    enabled: true
    binary-path: pandoc
    timeout-seconds: 120

  cleanup:
    enabled: true
    cron: "0 */10 * * * *"

logging:
  level:
    root: INFO
    com.docify: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.amqp: INFO
